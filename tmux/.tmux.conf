# ===== プレフィックス =====
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# ===== 基本設定 =====
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g history-limit 50000
setw -g automatic-rename off
set -g focus-events on
set -g status-position bottom

# ===== ターミナル・クリップボード =====
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",wezterm:Tc:Ms=\\E]52;%p1%s;%p2%s\\007"
set -g set-clipboard on
set -g copy-command "pbcopy"

# ===== マウス =====
set -g mouse on

# ===== キーバインド (WezTerm Cmd ミラー) =====

# 設定リロード (Cmd+R -> prefix r)
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# 分割 (Cmd+\ -> prefix \, Cmd+- -> prefix -)
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ペイン移動 (Cmd+Shift+矢印 -> prefix h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインズーム (Cmd+M -> prefix m)
bind m resize-pane -Z

# 新ウィンドウ (Cmd+T -> prefix t)
bind t new-window -c "#{pane_current_path}"

# ウィンドウ選択 (Cmd+P -> prefix p)
bind p choose-tree -Zw

# ウィンドウ前後移動 (Cmd+Alt+左右 -> prefix [ / ])
bind [ previous-window
bind ] next-window

# 全ペイン同期トグル (Cmd+S -> prefix s)
bind s set-window-option synchronize-panes \; display "sync: #{?synchronize-panes,ON,OFF}"

# ペイン閉じる (Cmd+W -> prefix w)
bind w confirm-before -p "kill pane? (y/n)" kill-pane

# ウィンドウ閉じる (Cmd+Shift+W -> prefix W)
bind W confirm-before -p "kill window? (y/n)" kill-window

# 検索 (Cmd+F -> prefix f)
bind f copy-mode \; send-keys /

# URL 選択 (prefix u) — ペイン内の URL を fzf で選択して開く
bind u run-shell -b "tmux capture-pane -J -p | grep -oE 'https?://[^[:space:]\"<>{}|\\\\^\\`\\[\\]]+' | sed 's/[.,;:!?)]*$//' | sort -u | fzf-tmux -p 80%,50% --reverse --prompt='Open URL: ' | xargs -r open"

# ===== コピーモード =====
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ===== Gruvbox Dark テーマ (WezTerm 色一致) =====

# ペインボーダー
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#d65d0e"

# ステータスバー
set -g status-style "bg=#141617,fg=#ebdbb2"
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 60

# ステータス左: セッション名
set -g status-left "#[fg=#141617,bg=#d65d0e,bold] #S #[fg=#d65d0e,bg=#141617]\ue0b0"

# ステータス右: 日時
set -g status-right "#[fg=#3c3836]\ue0b2#[fg=#ebdbb2,bg=#3c3836] %Y-%m-%d %H:%M "

# ウィンドウタブ (非アクティブ)
set -g window-status-format "#[fg=#928374,bg=#141617] #I:#W "

# ウィンドウタブ (アクティブ)
set -g window-status-current-format "#[fg=#141617,bg=#d65d0e]\ue0b0#[fg=#ebdbb2,bg=#d65d0e,bold] #I:#W #[fg=#d65d0e,bg=#141617]\ue0b0"

# セパレータ
set -g window-status-separator ""

# メッセージ
set -g message-style "bg=#d65d0e,fg=#ebdbb2"
set -g message-command-style "bg=#3c3836,fg=#ebdbb2"

# コピーモードハイライト
set -g mode-style "bg=#d65d0e,fg=#ebdbb2"

# 時計
set -g clock-mode-colour "#d65d0e"

# ===== アクティビティ =====
setw -g monitor-activity on
set -g visual-activity off

# ===== プラグイン (tpm) =====
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'

run '~/.tmux/plugins/tpm/tpm'
